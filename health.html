<!DOCTYPE html>
<html>
<head>
<title>Financial Health Score</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.box{
background:white;
padding:30px;
width:400px;
margin:auto;
margin-top:80px;
border-radius:10px;
box-shadow:0 0 10px gray;
}
</style>

</head>

<body>

<div class="box">

<h2>💰 Financial Health Score</h2>

<form method="POST" action="/health">

Monthly Income:<br>
<input type="number" name="income" required><br><br>

Monthly Expense:<br>
<input type="number" name="expense" required><br><br>

<button type="submit">Check Health</button>

</form>

{% if score %}
<h3>{{ score }}</h3>
{% endif %}

<br>
<a href="/dashboard">Back to Dashboard</a>

</div>

</body>
</html>
