<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f8;
    text-align:center;
}

h1{
    color:#2c3e50;
}

.container{
    width:80%;
    margin:auto;
}

/* CARD DESIGN */
.card{
    background:white;
    padding:20px;
    margin:20px;
    border-radius:12px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

/* FORM */
select,input{
    padding:10px;
    width:200px;
    margin:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    padding:10px 20px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

/* TABLE */
table{
    margin:auto;
    border-collapse:collapse;
    width:60%;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

th{
    background:#2ecc71;
    color:white;
}

.back-btn{
    padding:10px 20px;
    background:#2ecc71;
    color:white;
    border-radius:8px;
    text-decoration:none;
}

</style>
</head>

<body>

<h1>💰 Expense Tracker</h1>

<div class="container">

<!-- ADD EXPENSE CARD -->
<div class="card">

<form action="/expense_tracker" method="POST">

<select name="category" required>
    <option value="">Select Category</option>
    <option value="Food">Food</option>
    <option value="Travel">Travel</option>
    <option value="Shopping">Shopping</option>
    <option value="Bills">Bills</option>
</select>

<br>

<input type="number" name="amount" placeholder="Enter Amount" required>

<br>

<button type="submit">Add Expense</button>

</form>

</div>


<!-- EXPENSE TABLE CARD -->
<div class="card">

<h2>📊 Expense History</h2>

{% if expenses %}
<table>
<tr>
<th>Category</th>
<th>Amount (₹)</th>
</tr>

<tbody>
{% for expense in expenses %}
<tr>
    <td>{{ expense[0] }}</td>
    <td>{{ expense[1] }}</td>
</tr>
{% endfor %}
</tbody>

</table>

{% else %}
<p>No expenses added yet.</p>
{% endif %}

</div>

<a href="/dashboard" class="back-btn">⬅ Back to Dashboard</a>

</div>

</body>
</html>
