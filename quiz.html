<!DOCTYPE html>
<html>
<head>
<title>Finance Quiz</title>
</head>

<body>

<h2>🧠 Finance Quiz</h2>

<form method="POST" action="/quiz">

<p>1. Emergency fund should cover?</p>
<input type="radio" name="q1" value="a"> 1 Month<br>
<input type="radio" name="q1" value="b"> 6 Months<br>

<br>

<p>2. Best long-term investment?</p>
<input type="radio" name="q2" value="a"> SIP<br>
<input type="radio" name="q2" value="b"> Lottery<br>

<br>

<button type="submit">Submit Quiz</button>

</form>

{% if score is not none %}
<h3>Your Score: {{ score }}/2</h3>
{% endif %}

<br>
<a href="/dashboard">Back</a>

</body>
</html>
